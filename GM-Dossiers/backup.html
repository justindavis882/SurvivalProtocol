<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Protocol: GM Dossier 00</title>
    <style>
    /* BASE & SCREEN STYLES */
    :root {
        --black: #111;
        --font-main: 'Courier New', Courier, monospace;
    }
    
    body { background-color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

    /* PAGE LAYOUT */
    .page {
        background-color: white; width: 7.5in; height: 10in; margin-bottom: 20px; box-sizing: border-box; font-family: var(--font-main); color: var(--black); position: relative;
        background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 0.25in 0.25in;
    }

    .cover-page { background-color: var(--black); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;  }
    .divider-page { background-color: var(--black); color: white; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 1in; border: 12px solid white; }
    .content-layer { background: rgba(255,255,255,0.95); padding: 0.25in; height: 100%; box-sizing: border-box; border: 4px solid var(--black); display: flex; flex-direction: column; gap: 15px; }

    /* TYPOGRAPHY */
    h1, h2, h3, .caps { text-transform: uppercase; margin: 0; }
    h1 { font-size: 24px; font-weight: bold; border-bottom: 3px solid var(--black); padding-bottom: 5px; }
    h2 { font-size: 18px; background: var(--black); color: white; padding: 3px 8px; display: inline-block; }
    h3 { font-size: 14px; margin-top: 10px; border-bottom: 1px solid var(--black); display: inline-block;}
    
    .header-block { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--black); padding-bottom: 10px; }
    .logo-area { text-align: right; font-size: 10px; font-weight: bold; }
    .logo-area img { max-width: 120px; max-height: 50px; display: block; margin-bottom: 5px; filter: grayscale(100%); }

    .black-bg { background: var(--black); color: white; }

    /* RULEBOOK TEXT STYLING */
    .rules-text { font-size: 11px; line-height: 1.4; text-transform: none; column-count: 2; column-gap: 30px; }
    .rules-text p { margin-bottom: 10px; text-transform: none; }
    .rules-text ul { margin-top: 0; padding-left: 15px; }
    .rules-text li { margin-bottom: 5px; text-transform: none; }
    .rules-text h3 { text-transform: uppercase; margin-bottom: 5px; border-bottom: none; display: block; margin-top: 15px;}

    /* GM SPECIFIC ELEMENTS */
    .read-aloud { background: #eee; border-left: 4px solid var(--black); padding: 10px; font-style: italic; font-size: 11px; margin-bottom: 10px; column-span: all;}
    .gm-note { border: 2px dashed var(--black); padding: 10px; font-weight: bold; font-size: 10px; margin-bottom: 10px; text-transform: uppercase; background: white;}

    /* BOXES & GAUGES */
    .box { width: 18px; height: 18px; border: 2px solid var(--black); display: inline-block; }
    .bubble { width: 18px; height: 18px; border: 2px solid var(--black); border-radius: 50%; display: inline-block; }
    .gauge { display: flex; gap: 2px; }

    /* TABLES & GRIDS */
    table { width: 100%; border-collapse: collapse; margin-top: 5px; margin-bottom: 10px;}
    th, td { border: 1px solid var(--black); padding: 5px; text-align: left; font-size: 10px; }
    th { text-transform: uppercase; background: var(--black); color: white;}
    
    /* HANDOUT CARDS */
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
    .recipe-card { border: 2px dashed var(--black); padding: 15px; background: white; text-align: center; }
    .map-box { border: 4px solid var(--black); background: #eee; padding: 15px; position: relative; margin-top: 10px;}

    /* FIX 1: Ensure images never exceed their printable layer width/height */
    .content-layer img {
        max-width: 100%;
        height: auto;
        display: block;
    }

    /* FIX 2: Layout wrapper to keep recipe cards side-by-side cleanly */
    .recipe-wrapper {
        display: flex;
        gap: 15px;
        justify-content: center;
        align-items: center;
        flex-grow: 1;
    }
    .recipe-wrapper img {
        width: 48%; /* Allows two cards to sit perfectly side by side */
        height: auto;
    }
    
    /* PRINT MEDIA QUERIES */
    @media print {
        body { background: black; padding: 0; }
        @page { size: 8.5in 11in; margin: 0.5in; }
        
        /* FIX 3: Changed height to max-height for printing. 
           This stops the print engine from breaking or dropping overflow content. */
        .page { 
            width: 7.5in; 
            max-height: 10in; 
            margin: 0; 
            border: none; 
            page-break-after: always; 
            page-break-inside: avoid;
        }
        .cover-page, .divider-page { border: 12px solid var(--black); height: 10in; } /* Keeps covers full size */
    }
</style>
</head>
<body>

    <!-- 0. COVER PAGE -->
    <div class="page cover-page">
        <h1 style="border: none; font-size: 50px; margin-top: 10px; margin-bottom: 10px; line-height: 0.9;">THE BACK-UP<br>JOURNAL</h1>
        <div style="width: 100px; height: 4px; background: white; margin: 30px auto;"></div>
        <p style="font-size: 14px; font-weight: bold; margin-top: 30px; background: white; color: var(--black); padding: 5px 20px; display: inline-block;">FOR YOUR EXTRA NOTES AND FINDS.</p>
        
        <div style="position: absolute; bottom: 50px;">
            <img src="../logo.png" alt="Two Part Trading" style="filter: invert(1); max-width: 150px;">
            <p style="font-size: 10px; margin-top: 10px; color: #aaa;">PUBLISHED BY TWO PART TRADING STORE</p>
        </div>
    </div>
</body>
