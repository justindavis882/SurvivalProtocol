<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Terminal - Two Part Trading</title>
<style>
  body {
    background-color: #404040;
    background-image: linear-gradient(45deg, #333 25%, transparent 25%, transparent 75%, #333 75%, #333), 
                      linear-gradient(45deg, #333 25%, transparent 25%, transparent 75%, #333 75%, #333);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    font-family: "Lucida Console", Monaco, monospace;
    color: #e0e0e0;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }
  
  .chassis {
    background-color: #8c8c8c;
    border-top: 4px solid #dfdfdf;
    border-left: 4px solid #dfdfdf;
    border-bottom: 4px solid #2b2b2b;
    border-right: 4px solid #2b2b2b;
    width: 100%;
    max-width: 1200px;
    padding: 30px;
    position: relative;
    box-shadow: 10px 10px 15px rgba(0,0,0,0.6);
  }

  .hazard-tape {
    background: repeating-linear-gradient(
      -45deg,
      #ffcc00,
      #ffcc00 15px,
      #111 15px,
      #111 30px
    );
    height: 20px;
    border-top: 3px solid #2b2b2b;
    border-bottom: 3px solid #dfdfdf;
    margin-bottom: 25px;
  }

  .crt-screen {
    background-color: #051405;
    border-top: 6px solid #1a1a1a;
    border-left: 6px solid #1a1a1a;
    border-bottom: 6px solid #b3b3b3;
    border-right: 6px solid #b3b3b3;
    padding: 25px;
    color: #33ff00;
    text-shadow: 0 0 4px #33ff00;
    margin-bottom: 30px;
  }

  h1 {
    margin-top: 0;
    font-size: 2.2em;
    border-bottom: 3px solid #33ff00;
    padding-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  h2 {
    font-size: 1.5em;
    border-bottom: 2px dashed #33ff00;
    padding-bottom: 5px;
    text-transform: uppercase;
    margin-top: 0;
  }

  p {
    line-height: 1.6;
    font-size: 1.1em;
  }

  .btn-blocky {
    display: inline-block;
    background-color: #b3b3b3;
    color: #000;
    font-family: Arial, sans-serif;
    font-weight: bold;
    text-transform: uppercase;
    text-decoration: none;
    padding: 10px 20px;
    border-top: 4px solid #ffffff;
    border-left: 4px solid #ffffff;
    border-bottom: 4px solid #4d4d4d;
    border-right: 4px solid #4d4d4d;
    cursor: pointer;
    text-align: center;
    transition: filter 0.1s;
    box-sizing: border-box;
  }

  .btn-blocky:active {
    border-top: 4px solid #4d4d4d;
    border-left: 4px solid #4d4d4d;
    border-bottom: 4px solid #ffffff;
    border-right: 4px solid #ffffff;
    transform: translate(2px, 2px);
  }

  .btn-red {
    background-color: #ff4d4d;
    color: white;
  }

  .btn-green {
    background-color: #4dff4d;
    color: black;
  }

  /* Table Styles */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background-color: #020a02;
    border: 2px solid #33ff00;
  }

  th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px dashed #1a4d1a;
  }

  th {
    background-color: #1a4d1a;
    color: #33ff00;
    font-weight: bold;
    text-transform: uppercase;
  }

  tr:hover {
    background-color: #0a1f0a;
  }

  /* Form Styles */
  .form-group {
    margin-bottom: 15px;
  }

  label {
    display: block;
    margin-bottom: 5px;
    color: #b3ffb3;
  }

  input[type="text"], input[type="number"], textarea {
    width: 100%;
    padding: 10px;
    background-color: #000;
    border: 1px solid #33ff00;
    color: #33ff00;
    font-family: "Lucida Console", Monaco, monospace;
    box-sizing: border-box;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #fff;
    box-shadow: 0 0 5px #33ff00;
  }

  .admin-panel {
    display: none; /* Hidden until logged in */
  }

  .login-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
  }

  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal {
    display: none; 
    position: fixed; 
    z-index: 10; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%; 
    overflow: auto; 
    background-color: rgba(0,0,0,0.8); 
  }

  .modal-content {
    background-color: #051405;
    margin: 5% auto;
    padding: 20px;
    border: 4px solid #33ff00;
    width: 80%;
    max-width: 600px;
    box-shadow: 0 0 20px #33ff00;
  }

  .close-btn {
    color: #33ff00;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
  }

  .close-btn:hover,
  .close-btn:focus {
    color: #fff;
    text-decoration: none;
  }

  #user-info {
    color: #b3ffb3;
    font-size: 0.9em;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: #33ff00;
    text-decoration: none;
  }
  .back-link:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="chassis">
  <div class="hazard-tape"></div>
  
  <div class="crt-screen">
    <a href="index.html" class="back-link"><< RETURN TO MAIN TERMINAL</a>
    <h1>ADMIN OVERRIDE TERMINAL</h1>
    
    <!-- LOGIN PANEL -->
    <div id="login-panel" class="login-panel">
      <p>> AUTHORIZATION REQUIRED.</p>
      <p>> IDENTIFY YOURSELF.</p>
      <button id="login-btn" class="btn-blocky">AUTHENTICATE VIA GOOGLE</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="admin-panel">
      <div class="controls-row">
        <span id="user-info">> LOGGED IN AS: ...</span>
        <button id="logout-btn" class="btn-blocky">TERMINATE SESSION</button>
      </div>

      <h2>INVENTORY DATABASE</h2>
      <div class="controls-row" style="margin-top: 20px;">
        <button id="add-new-btn" class="btn-blocky btn-green">+ ADD NEW ASSET</button>
      </div>

      <div style="overflow-x: auto;">
        <table id="products-table">
          <thead>
            <tr>
              <th>ID / NAME</th>
              <th>PRICE</th>
              <th>IMAGE URL</th>
              <th>STRIPE LINK</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Data injected via JS -->
            <tr><td colspan="5" style="text-align: center;">> RETRIEVING DATA...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="hazard-tape" style="margin-top: 30px; margin-bottom: 0;"></div>
</div>

<!-- MODAL FOR ADD/EDIT -->
<div id="product-modal" class="modal">
  <div class="modal-content crt-screen" style="margin-bottom: 0;">
    <span class="close-btn">&times;</span>
    <h2 id="modal-title">ADD NEW ASSET</h2>
    
    <form id="product-form">
      <input type="hidden" id="doc-id">
      
      <div class="form-group">
        <label for="p-name">ASSET DESIGNATION (Name):</label>
        <input type="text" id="p-name" required>
      </div>
      
      <div class="form-group">
        <label for="p-price">REQUISITION COST (Price in USD):</label>
        <input type="number" id="p-price" step="0.01" required>
      </div>
      
      <div class="form-group">
        <label for="p-desc">ARCHIVE LOG (Description):</label>
        <textarea id="p-desc" rows="4" required></textarea>
      </div>

      <div class="form-group">
        <label for="p-image">IMAGE TELEMETRY (URL):</label>
        <input type="text" id="p-image">
      </div>

      <div class="form-group">
        <label for="p-stripe">STRIPE SECURE LINK:</label>
        <input type="text" id="p-stripe">
      </div>

      <button type="submit" class="btn-blocky btn-green" style="width: 100%; margin-top: 15px;">COMMIT TO DATABASE</button>
    </form>
  </div>
</div>

<script type="module">
  // FIREBASE IMPORTS
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

  // TODO: Replace with your actual Firebase project config
  const firebaseConfig = {
    apiKey: "AIzaSyAgMQB64cJ7l71lrpMc78Z-xMolzY9Vx_w",
    authDomain: "ryze-messenger.firebaseapp.com",
    projectId: "ryze-messenger",
    storageBucket: "ryze-messenger.firebasestorage.app",
    messagingSenderId: "59103143285",
    appId: "1:59103143285:web:1ba96df0f04bfeb88f5f3c",
    measurementId: "G-1Q2T8S1RCL"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // DOM Elements
  const loginPanel = document.getElementById('login-panel');
  const adminPanel = document.getElementById('admin-panel');
  const loginBtn = document.getElementById('login-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const userInfo = document.getElementById('user-info');
  const tableBody = document.getElementById('table-body');
  
  const modal = document.getElementById('product-modal');
  const closeBtn = document.querySelector('.close-btn');
  const addNewBtn = document.getElementById('add-new-btn');
  const productForm = document.getElementById('product-form');
  const modalTitle = document.getElementById('modal-title');

  // Form Fields
  const docIdInput = document.getElementById('doc-id');
  const nameInput = document.getElementById('p-name');
  const priceInput = document.getElementById('p-price');
  const descInput = document.getElementById('p-desc');
  const imageInput = document.getElementById('p-image');
  const stripeInput = document.getElementById('p-stripe');

  let productsData = [];

  // Authentication State Observer
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // User is signed in.
      loginPanel.style.display = 'none';
      adminPanel.style.display = 'block';
      userInfo.textContent = `> LOGGED IN AS: ${user.email}`;
      loadProducts();
    } else {
      // User is signed out.
      loginPanel.style.display = 'flex';
      adminPanel.style.display = 'none';
      tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">> AWAITING AUTHORIZATION...</td></tr>';
    }
  });

  // Login / Logout Handlers
  loginBtn.addEventListener('click', () => {
    if (firebaseConfig.apiKey === "YOUR_API_KEY") {
      alert("SYSTEM ERROR: FIREBASE CONFIG MISSING. Update the source code with your credentials.");
      return;
    }
    signInWithPopup(auth, provider).catch((error) => {
      console.error("Auth error:", error);
      alert("Authentication failed: " + error.message);
    });
  });

  logoutBtn.addEventListener('click', () => {
    signOut(auth);
  });

  // Load Products from Firestore
  async function loadProducts() {
    try {
      tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">> DOWNLOADING ARCHIVES...</td></tr>';
      const querySnapshot = await getDocs(collection(db, "products"));
      productsData = [];
      querySnapshot.forEach((doc) => {
        productsData.push({ id: doc.id, ...doc.data() });
      });
      renderTable();
    } catch (error) {
      console.error("Error loading products:", error);
      tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ff4d4d;">> ERROR: ${error.message} <br> Make sure your user has Firestore write/read access.</td></tr>`;
    }
  }

  // Render Table
  function renderTable() {
    tableBody.innerHTML = '';
    if (productsData.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">> NO ASSETS FOUND.</td></tr>';
      return;
    }

    productsData.forEach(product => {
      const tr = document.createElement('tr');
      const shortId = product.id.substring(0, 6) + '...';
      
      tr.innerHTML = `
        <td>
          <strong style="color: #fff;">${product.name || 'UNNAMED'}</strong><br>
          <span style="font-size: 0.8em; color: #888;">ID: ${shortId}</span>
        </td>
        <td>$${product.price || 0}</td>
        <td>${product.imageUrl ? '&#10003; Set' : '<span style="color:#ff4d4d;">Empty</span>'}</td>
        <td>${product.stripeLink ? '&#10003; Set' : '<span style="color:#ff4d4d;">Empty</span>'}</td>
        <td>
          <button class="btn-blocky edit-btn" data-id="${product.id}" style="padding: 5px 10px; font-size: 0.8em; margin-right: 5px;">EDIT</button>
          <button class="btn-blocky btn-red delete-btn" data-id="${product.id}" style="padding: 5px 10px; font-size: 0.8em;">DELETE</button>
        </td>
      `;
      tableBody.appendChild(tr);
    });

    // Attach event listeners to new buttons
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => openEditModal(e.target.getAttribute('data-id')));
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => deleteProduct(e.target.getAttribute('data-id')));
    });
  }

  // Modal Controls
  addNewBtn.addEventListener('click', () => {
    modalTitle.textContent = "ADD NEW ASSET";
    productForm.reset();
    docIdInput.value = '';
    modal.style.display = "block";
  });

  closeBtn.addEventListener('click', () => {
    modal.style.display = "none";
  });

  window.addEventListener('click', (event) => {
    if (event.target == modal) {
      modal.style.display = "none";
    }
  });

  function openEditModal(id) {
    const product = productsData.find(p => p.id === id);
    if (!product) return;

    modalTitle.textContent = "UPDATE ASSET";
    docIdInput.value = product.id;
    nameInput.value = product.name || '';
    priceInput.value = product.price || 0;
    descInput.value = product.description || '';
    imageInput.value = product.imageUrl || '';
    stripeInput.value = product.stripeLink || '';

    modal.style.display = "block";
  }

  // Handle Form Submit (Create / Update)
  productForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const id = docIdInput.value;
    const productData = {
      name: nameInput.value,
      price: parseFloat(priceInput.value),
      description: descInput.value,
      imageUrl: imageInput.value,
      stripeLink: stripeInput.value
    };

    try {
      if (id) {
        // Update existing document
        await setDoc(doc(db, "products", id), productData);
      } else {
        // Create new document
        await addDoc(collection(db, "products"), productData);
      }
      modal.style.display = "none";
      loadProducts(); // Refresh table
    } catch (error) {
      console.error("Error saving document: ", error);
      alert("Failed to save: " + error.message);
    }
  });

  // Handle Delete
  async function deleteProduct(id) {
    if (confirm("WARNING: Are you sure you want to purge this asset from the database? This action is irreversible.")) {
      try {
        await deleteDoc(doc(db, "products", id));
        loadProducts(); // Refresh table
      } catch (error) {
        console.error("Error removing document: ", error);
        alert("Failed to delete: " + error.message);
      }
    }
  }

</script>
</body>
</html>
